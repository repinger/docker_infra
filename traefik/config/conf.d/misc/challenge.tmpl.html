<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><meta name="color-scheme" content="light dark" /><title>Verifying connection</title><script src="{{ .FrontendJS }}" async defer referrerpolicy="no-referrer" ></script><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" /><style> :root { --page-bg: #f4f5f7; --card-bg: #ffffff; --card-border: #e2e6ec; --divider: #e2e6ec; --text-primary: #161c2a; --text-secondary: #5a6478; --blue: #2563eb; --blue-pale: #eff4ff; --blue-border: #bfcfff; --green: #16a34a; --green-pale: #f0fdf4; --green-border: #86efac; --amber: #b45309; --amber-pale: #fffbeb; --amber-border: #fcd34d; --step-idle-bg: #f4f5f7; --step-idle-border: #e2e6ec; --step-idle-color: #8f98a8; --shadow: 0 4px 16px rgba(15,24,40,0.08), 0 1px 4px rgba(15,24,40,0.05); --radius: 10px; --font-sans: 'Sora', system-ui, sans-serif; --font-mono: 'DM Mono', 'Courier New', monospace; --ease: cubic-bezier(0.32, 0, 0.16, 1); } @media (prefers-color-scheme: dark) { :root { --page-bg: #141414; --card-bg: #1c1c1e; --card-border: #2a2a2c; --divider: #2a2a2c; --text-primary: #e5e5ea; --text-secondary: #8e8e93; --blue: #4a90d9; --blue-pale: #1a2538; --blue-border: #2d4060; --green: #30c76a; --green-pale: #102418; --green-border: #1e5030; --amber: #e8a020; --amber-pale: #251c08; --amber-border: #5a4010; --step-idle-bg: #1c1c1e; --step-idle-border: #3a3a3c; --step-idle-color: #636366; --shadow: 0 4px 20px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.3); } } *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: var(--font-sans); background-color: var(--page-bg); color: var(--text-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; -webkit-font-smoothing: antialiased; } .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); box-shadow: var(--shadow); width: 100%; max-width: 500px; overflow: hidden; animation: cardIn 0.35s var(--ease) both; } @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } } .card-header { padding: 28px 32px 24px; border-bottom: 1px solid var(--divider); display: flex; align-items: flex-start; gap: 16px; } .header-icon { width: 48px; height: 48px; border-radius: 8px; background: var(--blue-pale); border: 1px solid var(--blue-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.3s ease, border-color 0.3s ease; } .header-text { flex: 1; min-width: 0; } .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 5px; color: var(--text-primary); } .header-desc { font-size: 13.5px; color: var(--text-secondary); line-height: 1.55; } .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; flex-shrink: 0; font-family: var(--font-mono); letter-spacing: 0.01em; } .status-badge.pending { background: var(--amber-pale); color: var(--amber); border: 1px solid var(--amber-border); } .status-badge.verified { background: var(--green-pale); color: var(--green); border: 1px solid var(--green-border); } .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; } .status-badge.pending .status-dot { animation: blink 1.8s ease-in-out infinite; } @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } } .card-body { padding: 24px 32px 28px; display: flex; flex-direction: column; gap: 22px; } .steps { display: flex; flex-direction: column; } .step { display: flex; align-items: center; gap: 14px; padding: 9px 0; position: relative; } .step:not(:last-child)::after { content: ''; position: absolute; left: 15px; top: 38px; bottom: -9px; width: 1px; background: var(--divider); } .step-indicator { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 600; font-family: var(--font-mono); transition: all 0.25s var(--ease); } .step-indicator.active { background: var(--blue-pale); border: 1px solid var(--blue-border); color: var(--blue); } .step-indicator.idle { background: var(--step-idle-bg); border: 1px solid var(--step-idle-border); color: var(--step-idle-color); } .step-indicator.done { background: var(--green-pale); border: 1px solid var(--green-border); color: var(--green); } .step-label { font-size: 14px; font-weight: 500; color: var(--text-primary); } .captcha-container { display: flex; justify-content: center; min-height: 78px; } @media (max-width: 540px) { .card-header { padding: 22px 22px 20px; flex-wrap: wrap; } .card-body { padding: 20px 22px 24px; } .header-text { width: 100%; } .status-badge { align-self: flex-start; } } @media (max-width: 380px) { body { padding: 14px; } .card-header { padding: 18px; } .card-body { padding: 16px 18px 20px; gap: 18px; } .header-icon { width: 40px; height: 40px; } .header-title { font-size: 15px; } } </style></head><body><div class="card" id="mainCard"><div class="card-header"><div class="header-icon" id="headerIcon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path id="iconPath1" d="M12 2L4 5.5V11C4 15.97 7.4 20.5 12 22C16.6 20.5 20 15.97 20 11V5.5L12 2Z" stroke="#2563eb" stroke-width="1.75" fill="none" stroke-linejoin="round"/><path id="iconPath2" d="M9 12l2 2 4-4" stroke="#2563eb" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="header-text"><div class="header-title" id="headerTitle">Verifying your connection</div><div class="header-desc" id="headerDesc">Complete the security check below to continue.</div></div><div class="status-badge pending" id="statusBadge"><div class="status-dot"></div> Pending </div></div><div class="card-body"><div class="steps"><div class="step"><div class="step-indicator active" id="step1ind">1</div><div class="step-label">Human verification</div></div><div class="step"><div class="step-indicator idle" id="step2ind">2</div><div class="step-label">Access granted</div></div></div><form action="{{ .ChallengeURL }}" method="post" id="captcha-form" accept-charset="UTF-8" ><div class="captcha-container"><div data-callback="captchaCallback" class="{{ .FrontendKey }}" data-sitekey="{{ .SiteKey }}" data-theme="auto" data-size="normal" data-language="auto" data-retry="auto" interval="8000" data-appearance="always" ></div></div><input type="hidden" name="destination" value="{{ .Destination }}" /></form></div></div><script type="text/javascript"> function captchaCallback(token) { var checkSvg = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'; document.getElementById('step1ind').className = 'step-indicator done'; document.getElementById('step1ind').innerHTML = checkSvg; document.getElementById('step2ind').className = 'step-indicator active'; document.getElementById('headerTitle').textContent = 'Verification complete'; document.getElementById('headerDesc').textContent = 'Redirecting you to your destination\u2026'; document.getElementById('headerIcon').style.background = 'var(--green-pale)'; document.getElementById('headerIcon').style.borderColor = 'var(--green-border)'; document.getElementById('iconPath1').setAttribute('stroke', '#16a34a'); document.getElementById('iconPath2').setAttribute('stroke', '#16a34a'); document.getElementById('statusBadge').className = 'status-badge verified'; document.getElementById('statusBadge').innerHTML = '<div class="status-dot"></div> Verified'; setTimeout(function() { document.getElementById('step2ind').className = 'step-indicator done'; document.getElementById('step2ind').innerHTML = checkSvg; document.getElementById('captcha-form').submit(); }, 1000); } </script></body></html>
